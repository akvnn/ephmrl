    - name: dockerhub-secret
  livenessProbe: null
  readinessProbe: null
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$2
      nginx.ingress.kubernetes.io/use-regex: "true"
    hosts:
      - host: ephmrl.ai
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
    tls: []
