
imagePullSecrets:
  - name: dockerhub-secret
imagePullSecretsCreate: false

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: ephmrl.ai
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 100m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 512Mi

livenessProbe: null
readinessProbe: null

autoscaling:
  enabled: false

configMapEnv:
  API_URL: https://ephmrl.ai/api
  AUTH0_DOMAIN: ephemeral-ai.us.auth0.com
  AUTH0_CLIENT_ID: Vufg23l0f9e2fDMVMj1zRIbRipJIPFde

secretEnv:
  SOME_ENV_SECRET: "c29tZV92YWx1ZQ=="

