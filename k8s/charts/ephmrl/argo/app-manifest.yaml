apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ephmrl
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akvnn/ephmrl.git
    targetRevision: argo
    path: k8s/charts/ephmrl 
    helm:
      valueFiles:
        - values/prd.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ephmrl-core
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true