        <rect x="0" y="0" width="12" height="60" rx="2" fill="#3d7a4a" />
        <rect x="18" y="10" width="12" height="40" rx="2" fill="#3d7a4a" opacity="0.8" />
        <rect x="36" y="20" width="12" height="20" rx="2" fill="#3d7a4a" opacity="0.6" />
        <circle cx="60" cy="30" r="3" fill="#3d7a4a" opacity="0.4" />
    </g>
</svg>
